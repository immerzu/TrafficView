name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run all tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\Run-AllTests.ps1
